<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk - Warmindo Pojok</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="start-page-layout">

    <div class="watermark-bg"></div>

    <div id="promo-screen" class="promo-screen">
        <div class="promo-overlay"></div>

        <div class="promo-progress">
            <div class="promo-progress-bar" id="promo-progress-bar"></div>
        </div>

        <div class="promo-container">
            <div class="promo-slider" id="promo-slider">
                <div class="promo-slide active">
                    <div class="promo-image-wrapper">
                        <img src="img/Katalog1.png" alt="Promo 1">
                    </div>
                </div>
                <div class="promo-slide">
                    <div class="promo-image-wrapper">
                        <img src="img/Katalog2.png" alt="Promo 2">
                    </div>
                </div>
            </div>

            <div class="promo-dots">
                <span class="promo-dot active" data-slide="0"></span>
                <span class="promo-dot" data-slide="1"></span>
            </div>

            <div class="promo-hint">
                <span>Geser untuk melihat promo</span>
                <div class="promo-arrows">
                    <span class="arrow-left">◀</span>
                    <span class="arrow-right">▶</span>
                </div>
            </div>
        </div>

        <button class="btn-skip-promo" onclick="tutupPromo()">
            Lewati →
        </button>
    </div>
    
    <header></header>

    <main>
        <div class="login-container">
            <h2>🍜 Mulai Pesan</h2>
            <form id="formMasuk">
                <div class="form-group">
                    <label for="username">Nama Pemesan</label>
                    <input type="text" id="username" placeholder="Masukkan nama" required>
                </div>
                
                <div class="form-group">
                    <label for="meja">Nomor Meja</label>
                    <input type="number" id="meja" placeholder="Contoh: 04" required min="1">
                </div>

                <button type="submit" class="btn-masuk">Masuk</button>
            </form>
        </div>
    </main>

    <footer></footer>

    <script src="script.js"></script>
</body>
</html>
