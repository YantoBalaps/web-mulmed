<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Nutrisari</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container detail-container">
        
        <!-- Page Header -->
        <div class="page-header">
            <button class="btn-back" onclick="window.location.href='es.html'">←</button>
            <h2 class="page-title">🍹 Detail Menu</h2>
            <div style="width: 44px;"></div>
        </div>

        <!-- Main Food Display - Full Width -->
        <div class="main-food-hero">
            <div class="main-food-image">
                <img src="img/Es_Nutrisari.png" alt="Nutrisari" onerror="this.style.display='none'">
                <div class="main-food-fallback"></div>
            </div>
            
            <!-- Floating Ingredients - 2 items -->
            <div class="floating-ingredients">
                <div class="float-item fi-item-1-2">
                    <img src="img/Es.png" alt="Es">
                    <span>Es</span>
                </div>
                <div class="float-item fi-item-2-2">
                    <img src="img/Nutrisari.png" alt="Nutrisari">
                    <span>Nutrisari</span>
                </div>
            </div>
        </div>

        <!-- Detail Description -->
        <div class="detail-desc">
            <h3>📋 Rincian Isian</h3>
            <ul>
                <li>Es Batu Dingin segar</li>
                <li>Powder Nutrisari pilihan</li>
            </ul>
            <div class="price-tag">Rp 5.000</div>
        </div>
        
        <!-- Custom/Select Button for Nutrisari -->
        <button class="btn-custom-menu" onclick="bukaCustom('aneka-nutrisari')">
            <span>✨</span> Pilih Nutrisari
        </button>
        
        <!-- Quantity Control -->
        <div class="bottom-qty-wrapper">
            <div class="qty-control">
                <button class="qty-btn" onclick="updateQty('Nutrisari', 5000, -1)">−</button>
                <input type="number" id="qty-Nutrisari" class="qty-input" value="0" readonly>
                <button class="qty-btn" onclick="updateQty('Nutrisari', 5000, 1)">+</button>
            </div>
        </div>

        <!-- Floating Cart -->
        <button class="floating-cart" onclick="toggleCart()">🛒 <span id="cart-badge" class="cart-badge">0</span></button>
        
        <div id="cart-overlay" class="cart-overlay" onclick="toggleCart()"></div>
        <div id="cart-drawer" class="cart-drawer">
            <div class="drawer-header">
                <h3>Daftar Pesanan</h3>
                <button class="close-drawer" onclick="toggleCart()">✕</button>
            </div>
            <div id="cart-items-container" class="cart-items-container">
                <p class="empty-cart-msg">Keranjang masih kosong</p>
            </div>
            <div class="drawer-footer">
                <div class="total-section">
                    <span>Total:</span>
                    <span id="cart-total" class="total-price">Rp 0</span>
                </div>
                <div class="action-buttons">
                    <button class="btn-continue-shop" onclick="toggleCart()">Lanjut Belanja</button>
                    <button class="btn-checkout" onclick="prosesPembayaran()">Lanjut Pembayaran</button>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
