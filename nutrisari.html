<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Nutrisari</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container detail-container">
        
        <div class="page-header card-header">
            <h2 class="page-title">🍧 Detail Menu</h2>
            <button class="btn-back" onclick="window.location.href='es.html'">&#10005;</button>
        </div>

        <div class="diagram-wrapper">
            <div class="node-main">
                <img src="img/nasi-telur-polos.png" alt="Menu Utama">
            </div>
        </div>

        <div class="detail-desc">
            <h3>Rincian Nutrisari:</h3>
            <ul>
                <li>Es Dingin + Nutrisari Random</li>
                <li>Silakan Pilih Nutrisari dibawah</li>
            </ul>
            <div class="price-tag">Rp 5.000</div>
        </div>

        <button onclick="bukaCustom('aneka-nutrisari')" style="width: 100%; margin-bottom: 20px; padding: 14px; background: linear-gradient(135deg, #f39c12, #d35400); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; box-shadow: 0 4px 10px rgba(211, 84, 0, 0.3); transition: transform 0.2s ease;">
            ✨ Pilih Nutrisari
        </button>
        
        <div class="bottom-qty-wrapper">
            <div class="qty-control">
                <button class="qty-btn" onclick="updateQty('Nutrisari', 5000, -1)">-</button>
                <input type="number" id="qty-Nutrisari" class="qty-input" value="0" readonly>
                <button class="qty-btn" onclick="updateQty('Nutrisari', 5000, 1)">+</button>
            </div>
        </div>

        <button class="floating-cart" onclick="toggleCart()">🛒 <span id="cart-badge" class="cart-badge">0</span></button>
        
        <div id="cart-overlay" class="cart-overlay" onclick="toggleCart()"></div>
        <div id="cart-drawer" class="cart-drawer">
            <div class="drawer-header">
                <h3>Daftar Pesanan</h3>
                <button class="close-drawer" onclick="toggleCart()">&#10005;</button>
            </div>
            <div id="cart-items-container" class="cart-items-container"></div>
            <div class="drawer-footer">
                <div class="total-section">
                    <span>Total:</span>
                    <span id="cart-total" class="total-price">Rp 0</span>
                </div>
                <div class="action-buttons">
                    <button class="btn-continue-shop" onclick="toggleCart()">Lanjut Belanja</button>
                    <button class="btn-checkout" onclick="prosesPembayaran()">Lanjut Pembayaran</button>
                </div>
            </div>
        </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
