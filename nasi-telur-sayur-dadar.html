<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Nasi Telur Sayur Dadar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container detail-container">
        
        <!-- Page Header -->
        <div class="page-header">
            <button class="btn-back" onclick="window.location.href='nasi-telur.html'">←</button>
            <h2 class="page-title">🍳 Detail Menu</h2>
            <div style="width: 44px;"></div>
        </div>

        <!-- Main Food Display - Full Width -->
        <div class="main-food-hero">
            <div class="main-food-image">
                <img src="img/Nasi_Sayur_Telur_Dadar.png" alt="Nasi Telur Sayur Dadar" onerror="this.style.display='none'">
                <div class="main-food-fallback"></div>
            </div>
            
            <!-- Floating Ingredients around the main image -->
            <div class="floating-ingredients">
                <div class="float-item fi-nasi-4">
                    <img src="https://img.icons8.com/emoji/80/rice.png" alt="Nasi">
                    <span>Nasi</span>
                </div>
                <div class="float-item fi-ayam-4">
                    <img src="https://img.icons8.com/emoji/80/egg.png" alt="Telur">
                    <span>Telur</span>
                </div>
                <div class="float-item fi-sambal-4">
                    <img src="https://img.icons8.com/emoji/80/leafy-green.png" alt="Sayur">
                    <span>Sayur</span>
                </div>
                <div class="float-item fi-lalapan-4">
                    <img src="https://img.icons8.com/emoji/80/cucumber.png" alt="Lalapan">
                    <span>Lalapan</span>
                </div>
            </div>
        </div>

        <!-- Detail Description -->
        <div class="detail-desc">
            <h3>📋 Rincian Isian</h3>
            <ul>
                <li>Nasi Putih Hangat premium</li>
                <li>Telur Dadar tebal & fluffy</li>
                <li>Sayur tumis segar pilihan</li>
                <li>Lalapan segar (Timun, Selada)</li>
            </ul>
            <div class="price-tag">Rp 10.000</div>
        </div>
        
        <!-- Custom Menu Button -->
        <button class="btn-custom-menu" onclick="bukaCustom('nasi-telur-sayur-dadar')">
            <span>✨</span> Bikin Makananmu Sendiri
        </button>
        
        <!-- Quantity Control -->
        <div class="bottom-qty-wrapper">
            <div class="qty-control">
                <button class="qty-btn" onclick="updateQty('Nasi Telur Sayur Dadar', 10000, -1)">−</button>
                <input type="number" id="qty-Nasi Telur Sayur Dadar" class="qty-input" value="0" readonly>
                <button class="qty-btn" onclick="updateQty('Nasi Telur Sayur Dadar', 10000, 1)">+</button>
            </div>
        </div>

    </div>

    <!-- Floating Cart -->
    <button class="floating-cart" onclick="toggleCart()">
        🛒 <span id="cart-badge" class="cart-badge">0</span>
    </button>

    <div id="cart-overlay" class="cart-overlay" onclick="toggleCart()"></div>
    <div id="cart-drawer" class="cart-drawer">
        <div class="drawer-header">
            <h3>Daftar Pesanan</h3>
            <button class="close-drawer" onclick="toggleCart()">✕</button>
        </div>
        <div id="cart-items-container" class="cart-items-container">
            <p class="empty-cart-msg">Keranjang masih kosong</p>
        </div>
        <div class="drawer-footer">
            <div class="total-section">
                <span>Total:</span>
                <span id="cart-total" class="total-price">Rp 0</span>
            </div>
            <div class="action-buttons">
                <button class="btn-continue-shop" onclick="toggleCart()">Lanjut Belanja</button>
                <button class="btn-checkout" onclick="prosesPembayaran()">Lanjut Pembayaran</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
