<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Mie Kuah</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container detail-container">
        
        <div class="page-header card-header">
            <h2 class="page-title">🍜 Detail Menu</h2>
            <button class="btn-back" onclick="window.location.href='mie.html'">&#10005;</button> </div>

        <div class="diagram-wrapper">
            
            <svg class="diagram-lines" width="100%" height="100%">
                <defs>
                    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
                        markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="#999" />
                    </marker>
                </defs>
                <line x1="50%" y1="50%" x2="22%" y2="28%" stroke="#999" stroke-width="2.5" marker-end="url(#arrow)" />
                <line x1="50%" y1="50%" x2="78%" y2="28%" stroke="#999" stroke-width="2.5" marker-end="url(#arrow)" />
                <line x1="50%" y1="50%" x2="50%" y2="82%" stroke="#999" stroke-width="2.5" marker-end="url(#arrow)" />
            </svg>

            <div class="node-main">
                <img src="https://via.placeholder.com/200?text=Ayam+Geprek" alt="Menu Utama">
            </div>

            <div class="node-sub pos-1">
                <img src="https://via.placeholder.com/60?text=Timun" alt="Timun">
                <span>Mie</span>
            </div>
            <div class="node-sub pos-2">
                <img src="https://via.placeholder.com/60?text=Cabe" alt="Cabe">
                <span>Sayur</span>
            </div>
            <div class="node-sub pos-3">
                <img src="https://via.placeholder.com/60?text=Ayam" alt="Ayam Goreng">
                <span>Bawang goreng</span>
            </div>

        </div>

        <div class="detail-desc">
            <h3>Rincian Isian Mie Kuah:</h3>
            <ul>
                <li>Mie Hangat</li>
                <li>Sayuran enak</li>
                <li>Bawang Goreng</li>
            </ul>
            <div class="price-tag">Rp 7.000</div>
        </div>
        
        <button onclick="bukaCustom('mie-kuah')" style="width: 100%; margin-bottom: 20px; padding: 14px; background: linear-gradient(135deg, #f39c12, #d35400); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; box-shadow: 0 4px 10px rgba(211, 84, 0, 0.3); transition: transform 0.2s ease;">
            ✨ Bikin Makananmu Sendiri
        </button>
        
        <div class="bottom-qty-wrapper">
            <div class="qty-control">
                <button class="qty-btn" onclick="updateQty('Mie Kuah', 7000, -1)">-</button>
                <input type="number" id="qty-Mie Kuah" class="qty-input" value="0" readonly>
                <button class="qty-btn" onclick="updateQty('Mie Kuah', 7000, 1)">+</button>
            </div>
        </div>

        <button class="floating-cart" onclick="toggleCart()">
            🛒 <span id="cart-badge" class="cart-badge">0</span>
        </button>

        <div id="cart-overlay" class="cart-overlay" onclick="toggleCart()"></div>
        <div id="cart-drawer" class="cart-drawer">
            <div class="drawer-header">
                <h3>Daftar Pesanan</h3>
                <button class="close-drawer" onclick="toggleCart()">&#10005;</button>
            </div>
            <div id="cart-items-container" class="cart-items-container">
                <p class="empty-cart-msg">Keranjang masih kosong</p>
            </div>
            <div class="drawer-footer">
                <div class="total-section">
                    <span>Total:</span>
                    <span id="cart-total" class="total-price">Rp 0</span>
                </div>
                <div class="action-buttons">
                    <button class="btn-continue-shop" onclick="toggleCart()">Lanjut Belanja</button>
                    <button class="btn-checkout" onclick="prosesPembayaran()">Lanjut Pembayaran</button>
                </div>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
